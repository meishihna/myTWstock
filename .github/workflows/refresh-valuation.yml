# 定期更新報告內估值／股價表（yfinance），可選自動 commit。
# 若 Yahoo 限流或逾時，請改用手動在本機執行 python scripts/update_valuation.py 後再推。
name: Refresh valuation (optional)

on:
  workflow_dispatch:
  schedule:
    # 週一至週五 台灣時間約 08:10 UTC+8 視為盤後空檔（UTC 00:10）
    - cron: "10 0 * * 1-5"

concurrency:
  group: refresh-valuation
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      # 全市更新耗時長，若逾時可改為 --sector 或 --batch 分批另開 workflow
      - name: Update valuation tables
        run: python scripts/update_valuation.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Pilot_Reports || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh valuation tables (automated)"
            git push
          fi
